<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNS投稿マネージャー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #e8eef6;
  --panel: #ffffff;
  --card: #ffffff;
  --border: #d0dae8;
  --border-light: #e4ecf5;
  --cyan: #00b8a9;
  --blue: #0090e0;
  --white: #1a2b3c;
  --muted: #7a8fa8;
  --draft: #f59e0b;
  --scheduled: #00b8a9;
  --posted: #9aafc4;
  --danger: #ef4444;
  --shadow: 0 2px 8px rgba(0,80,160,0.08);
  --shadow-hover: 0 4px 16px rgba(0,80,160,0.13);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--white); min-height: 100vh; }

header {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 2px 8px rgba(0,80,160,0.07);
}
.logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; color: var(--white); }
.logo span { color: var(--cyan); }
.logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--cyan), var(--blue)); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.header-date { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }

.tab-bar { display: flex; background: var(--panel); border-bottom: 1px solid var(--border); padding: 0 24px; overflow-x: auto; }
.tab { padding: 14px 20px; font-size: 13px; font-weight: 700; color: var(--muted); cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; white-space: nowrap; }
.tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }
.tab:hover:not(.active) { color: var(--white); }

.view { display: none; padding: 20px 28px; width: 100%; }
.view.active { display: block; }

/* TODAY */
.today-hero {
  background: linear-gradient(135deg, rgba(0,184,169,0.1), rgba(0,144,224,0.07));
  border: 1px solid rgba(0,184,169,0.25);
  border-radius: 14px;
  padding: 18px 24px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: var(--shadow);
}
.today-title { font-size: 18px; font-weight: 700; color: var(--cyan); }
.today-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
.today-count { font-family: 'DM Mono', monospace; font-size: 36px; font-weight: 700; color: var(--cyan); text-align: right; }
.today-count span { font-size: 13px; color: var(--muted); font-family: 'Noto Sans JP', sans-serif; font-weight: 400; }

.today-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 14px;
  transition: box-shadow 0.2s, border-color 0.2s;
  animation: fadeIn 0.25s ease;
  box-shadow: var(--shadow);
}
.today-card:hover { box-shadow: var(--shadow-hover); border-color: var(--cyan); }
.today-card.is-done { opacity: 0.5; border-style: dashed; box-shadow: none; }

.card-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }

/* ★ 共通バッジスタイル（リストや今日画面用） */
.pbadge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; }

/* ★ X, Threads, FB のバッジ（背景なし・青文字） */
.pbadge-X, .pbadge-Threads, .pbadge-Facebook {
  background: transparent !important;
  border: none !important;
  color: #3b82f6 !important;
  padding: 0 !important;
  font-size: 13px !important;
}

/* ★ note のバッジ（緑系） */
.pbadge-note {
  background: rgba(22, 163, 74, 0.1) !important;
  border: 1px solid #16a34a !important;
  color: #15803d !important;
}

/* ★ BASE のバッジ（黄色系） */
.pbadge-BASE {
  background: rgba(245, 158, 11, 0.15) !important;
  border: 1px solid #d97706 !important;
  color: #b45309 !important;
}

.post-time { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
.done-pill { margin-left: auto; font-size: 11px; padding: 2px 10px; border-radius: 10px; background: rgba(154,175,196,0.18); color: var(--posted); border: 1px solid rgba(154,175,196,0.3); }

.text-box {
  font-size: 14px;
  line-height: 1.78;
  color: var(--white);
  white-space: pre-wrap;
  word-break: break-word;
  background: #f4f7fb;
  border: 1px solid var(--border-light);
  border-radius: 9px;
  padding: 13px 14px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  user-select: text;
}
.text-box:hover { border-color: var(--cyan); background: rgba(0,184,169,0.04); }
.text-box.flash { border-color: var(--cyan); background: rgba(0,184,169,0.08); }

.memo-line { font-size: 11px; color: var(--muted); margin-bottom: 12px; }
.card-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

.abtn {
  padding: 7px 15px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: #fff;
  color: var(--muted);
  font-size: 12px;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 5px;
}
.abtn:hover { border-color: var(--cyan); color: var(--cyan); background: rgba(0,184,169,0.05); }
.abtn.primary { background: linear-gradient(135deg, var(--cyan), var(--blue)); border: none; color: #fff; font-size: 13px; padding: 8px 20px; }
.abtn.primary:hover { opacity: 0.88; transform: translateY(-1px); }
.abtn.copied { background: rgba(0,184,169,0.1); border-color: var(--cyan); color: var(--cyan); }
.abtn.danger:hover { border-color: var(--danger); color: var(--danger); background: rgba(239,68,68,0.05); }

.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-state .ico { font-size: 48px; margin-bottom: 14px; }
.empty-state p { font-size: 14px; line-height: 1.9; }
.empty-link { color: var(--cyan); cursor: pointer; text-decoration: underline; }


/* PC カレンダー：全幅縦並び */
.cal-grid-hd, .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; width: 100%; }
.cal-grid-hd { margin-bottom: 8px; }
.cal-hd { text-align: center; font-size: 15px; font-weight: 700; padding: 10px 0; letter-spacing: 0.04em; }
.cal-hd.hd-mon,.cal-hd.hd-tue,.cal-hd.hd-wed,.cal-hd.hd-thu,.cal-hd.hd-fri { color: #4a6078; }
.cal-hd.hd-sat { color: #2563eb; }
.cal-hd.hd-sun { color: #dc2626; }

.cal-cell {
  min-height: 160px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 12px 8px;
  cursor: pointer;
  transition: box-shadow 0.18s, border-color 0.18s;
  box-shadow: var(--shadow);
  position: relative;
}
.cal-cell:hover { border-color: var(--cyan); box-shadow: var(--shadow-hover); }
.cal-cell.is-today { border-color: var(--cyan); border-width: 2px; background: rgba(0,184,169,0.07); }
.cal-cell.is-selected { border-color: var(--blue); border-width: 2px; background: rgba(0,144,224,0.07); }
.cal-cell.other-m { opacity: 0.35; pointer-events: none; box-shadow: none; }

.cal-cell.is-sat { background: rgba(96,165,250,0.06); border-color: rgba(96,165,250,0.3); }
.cal-cell.is-sat:hover { border-color: #3b82f6; }
.cal-cell.is-sat .cal-day { color: #1d4ed8; }

.cal-cell.is-sun { background: rgba(248,113,113,0.06); border-color: rgba(248,113,113,0.28); }
.cal-cell.is-sun:hover { border-color: #ef4444; }
.cal-cell.is-sun .cal-day { color: #b91c1c; }

.cal-cell.is-hol { background: rgba(248,113,113,0.06); border-color: rgba(248,113,113,0.28); }
.cal-cell.is-hol .cal-day { color: #b91c1c; }

.cal-cell.is-today .cal-day { color: var(--cyan) !important; font-weight: 700; }

@keyframes flash-highlight {
  0% { box-shadow: 0 0 0 4px var(--cyan); transform: scale(1.03); background-color: rgba(0, 184, 169, 0.15); z-index: 10; }
  100% { box-shadow: var(--shadow); transform: scale(1); background-color: var(--card); z-index: 1; }
}
.flash-cell {
  animation: flash-highlight 1.5s ease-out;
}

.cal-day { font-size: 20px; font-family: 'DM Mono', monospace; color: #1a2b3c; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; line-height: 1.2; }
.hol-name { font-size: 11px; color: #b91c1c; font-family: 'Noto Sans JP', sans-serif; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ★ カレンダーのドット表示共通 */
.cal-dot { 
  font-size: 12px; font-weight: 700; padding: 3px 7px; border-radius: 5px; 
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
  margin-top: 4px; line-height: 1.5; cursor: pointer; 
  transition: opacity 0.2s, transform 0.1s; 
  position: relative; z-index: 10; 
}
.cal-dot:hover { opacity: 0.8; transform: scale(1.02); }

/* ★ カレンダー：SNS3つは「枠線なし・背景なし・青文字」 */
.cal-dot.sns-src {
  background: transparent !important;
  border: none !important;
  color: #3b82f6 !important; /* 青文字 */
  padding-left: 2px !important;
}

/* ★ カレンダー：noteのみ（緑系） */
.cal-dot.note-src {
  background: rgba(22, 163, 74, 0.1) !important;
  border: 1px solid #16a34a !important;
  color: #15803d !important;
}

/* ★ カレンダー：BASEのみ（黄色系） */
.cal-dot.base-src {
  background: rgba(245, 158, 11, 0.15) !important;
  border: 1px solid #d97706 !important;
  color: #b45309 !important;
}

/* ★ カレンダー：note・BASE両方（ピンク系） */
.cal-dot.pink-src {
  background: rgba(244, 114, 182, 0.1) !important;
  border: 1px solid #f472b6 !important;
  color: #db2777 !important;
}


.day-detail {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 24px;
}
.dd-placeholder { color: var(--muted); font-size: 13px; text-align: center; padding: 20px; line-height: 2; }
.dd-cards-wrap { display: flex; flex-wrap: wrap; gap: 14px; }
.dd-title { font-size: 15px; font-weight: 700; color: var(--cyan); margin-bottom: 14px; display: flex; align-items: center; gap: 12px; }
.dd-add-link { font-size: 12px; color: var(--cyan); cursor: pointer; text-decoration: underline; font-weight: 400; }
.dd-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 18px 0; }
.dd-card { display: flex; align-items: flex-start; gap: 12px; padding: 14px; background: #f7fafd; border: 1px solid var(--border); border-radius: 9px; transition: box-shadow 0.2s, border-color 0.2s; flex: 1 1 360px; }
.dd-card:hover { border-color: var(--cyan); box-shadow: var(--shadow); }
.dd-left { min-width: 60px; display: flex; flex-direction: column; gap: 4px; }
.dd-text { flex: 1; font-size: 13px; line-height: 1.7; color: var(--white); white-space: pre-wrap; word-break: break-word; }
.dd-actions { display: flex; flex-direction: row; flex-wrap: wrap; gap: 5px; }
.smbtn { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: #fff; color: var(--muted); font-size: 11px; font-family: 'Noto Sans JP', sans-serif; font-weight: 700; cursor: pointer; white-space: nowrap; transition: all 0.2s; display: flex; align-items: center; gap: 4px; }
.smbtn:hover { border-color: var(--cyan); color: var(--cyan); background: rgba(0,184,169,0.05); }
.smbtn.danger:hover { border-color: var(--danger); color: var(--danger); background: rgba(239,68,68,0.05); }

/* 今日の投稿 */
.today-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(440px, 1fr)); gap: 16px; }
.today-grid .today-card { margin-bottom: 0; }
/* ネタ作成 */
#view-create > * { max-width: 660px; }
/* ネタ一覧 */
.stock-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(440px, 1fr)); gap: 14px; }
.stock-grid .stock-card { margin-bottom: 0; }

/* フォーム */
.form-sec { margin-bottom: 16px; }
.flabel { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; margin-bottom: 7px; }
input[type=text], input[type=datetime-local], textarea, select { width: 100%; background: #fff; border: 1px solid var(--border); border-radius: 9px; color: var(--white); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; padding: 10px 13px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; box-shadow: inset 0 1px 3px rgba(0,0,0,0.04); }
input:focus, textarea:focus, select:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,184,169,0.12); }
input[type=datetime-local] { color-scheme: light; }
textarea { resize: vertical; min-height: 120px; line-height: 1.7; }
select option { background: #fff; color: var(--white); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.ppicker { display: flex; gap: 8px; flex-wrap: wrap; }
.pbtn { flex: 1; min-width: 90px; padding: 9px 6px; border-radius: 9px; border: 2px solid var(--border); background: #f7fafd; color: var(--muted); font-size: 12px; font-family: 'Noto Sans JP', sans-serif; font-weight: 700; cursor: pointer; text-align: center; transition: all 0.18s; }

/* ★ フォームボタン：SNS3つは常に枠・背景なし */
.pbtn[data-p="X"], .pbtn[data-p="Threads"], .pbtn[data-p="Facebook"] {
  border-color: transparent !important;
  background-color: transparent !important;
  box-shadow: none !important;
}

/* ★ フォームボタン：SNS3つの未選択時はグレーの細文字 */
.pbtn[data-p="X"]:not([class*="on-"]),
.pbtn[data-p="Threads"]:not([class*="on-"]),
.pbtn[data-p="Facebook"]:not([class*="on-"]) {
  color: var(--muted) !important;
  font-weight: 400 !important;
}

/* ★ フォームボタン：SNS3つの選択時は薄いブルーの青文字 */
.pbtn.on-X, .pbtn.on-Threads, .pbtn.on-Facebook {
  color: #3b82f6 !important;
  font-weight: 700 !important;
}

/* ★ フォームボタン：note は緑系 */
.pbtn.on-note {
  border-color: #16a34a !important;
  color: #15803d !important;
  background: rgba(22, 163, 74, 0.1) !important;
  font-weight: 700 !important;
}

/* ★ フォームボタン：BASE は黄色系 */
.pbtn.on-BASE {
  border-color: #d97706 !important;
  color: #b45309 !important;
  background: rgba(245, 158, 11, 0.15) !important;
  font-weight: 700 !important;
}

.char-cc { text-align: right; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); margin-top: 4px; }
.char-cc.warn { color: var(--draft); }
.char-cc.over { color: var(--danger); }

/* 元ネタ情報ボックス */
.source-box { background: rgba(0,184,169,0.05); border: 1px solid rgba(0,184,169,0.25); border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; display: none; }
.source-box.show { display: block; }
.source-box-title { font-size: 12px; font-weight: 700; color: var(--cyan); margin-bottom: 10px; letter-spacing: 0.05em; }

/* ★ リスト内に表示されるリンク表示部分 */
.card-source { font-size: 11px; color: var(--muted); margin-bottom: 10px; padding: 6px 10px; border-radius: 6px; }
/* それぞれの色分け */
.card-source.note-only { background: rgba(22, 163, 74, 0.05); border-left: 3px solid #16a34a; }
.card-source.base-only { background: rgba(245, 158, 11, 0.05); border-left: 3px solid #d97706; }
.card-source.both-src { background: rgba(244, 114, 182, 0.05); border-left: 3px solid #f472b6; }
.card-source a { color: var(--cyan); word-break: break-all; }

/* ネタ作成のボタンエリア */
.form-actions { display: flex; gap: 10px; margin-top: 20px; }
.btn-save { flex: 2; padding: 13px; background: linear-gradient(135deg, var(--cyan), var(--blue)); border: none; border-radius: 10px; color: #fff; font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.15s; box-shadow: 0 3px 10px rgba(0,184,169,0.3); }
.btn-save:hover { opacity: 0.88; transform: translateY(-1px); }
.btn-clear { flex: 1; padding: 13px; background: #fff; border: 1px solid var(--border); border-radius: 10px; color: var(--muted); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s; font-weight: 700; }
.btn-clear:hover { border-color: var(--cyan); color: var(--cyan); }
.btn-danger-form { flex: 1; padding: 13px; background: #fff; border: 1px solid var(--danger); border-radius: 10px; color: var(--danger); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s; display: none; font-weight: 700; }
.btn-danger-form:hover { background: rgba(239,68,68,0.05); }

/* FAB (Floating Action Button) */
.fab-btn {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--cyan), var(--blue));
  color: #fff;
  font-size: 32px;
  font-weight: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(0,184,169,0.4);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  z-index: 400;
  border: none;
  line-height: 1;
}
.fab-btn:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 6px 20px rgba(0,184,169,0.5);
}

.edit-notice { font-size: 12px; color: #b45309; padding: 9px 14px; background: rgba(245,158,11,0.08); border-radius: 8px; margin-bottom: 14px; border: 1px solid rgba(245,158,11,0.3); display: none; }
.sfilter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
.sfbtn { padding: 6px 14px; border-radius: 16px; border: 1px solid var(--border); background: #fff; color: var(--muted); font-size: 12px; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; transition: all 0.18s; box-shadow: var(--shadow); }
.sfbtn.on { background: var(--cyan); border-color: var(--cyan); color: #fff; font-weight: 700; }
.sfbtn:hover:not(.on) { border-color: var(--cyan); color: var(--cyan); }
.sf-srch { margin-left: auto; background: #fff; border: 1px solid var(--border); border-radius: 16px; color: var(--white); font-family: 'Noto Sans JP', sans-serif; font-size: 12px; padding: 6px 14px; width: 180px; outline: none; box-shadow: var(--shadow); }
.sf-srch:focus { border-color: var(--cyan); }
.stock-card { background: var(--card); border: 1px solid var(--border); border-radius: 11px; padding: 16px 18px; animation: fadeIn 0.25s ease; transition: box-shadow 0.18s, border-color 0.18s; box-shadow: var(--shadow); }
.stock-card:hover { box-shadow: var(--shadow-hover); border-color: var(--cyan); }
.sc-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 9px; }
.spill { padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; }
.spill-draft { background: rgba(245,158,11,0.12); color: #b45309; border: 1px solid rgba(245,158,11,0.3); }
.spill-scheduled { background: rgba(0,184,169,0.12); color: var(--cyan); border: 1px solid rgba(0,184,169,0.3); }
.spill-posted { background: rgba(154,175,196,0.15); color: var(--posted); border: 1px solid rgba(154,175,196,0.3); }
.sc-date { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
.sc-text { font-size: 13px; line-height: 1.7; color: var(--white); white-space: pre-wrap; word-break: break-word; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.sc-memo { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
.sc-actions { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
.scbtn { padding: 5px 12px; border-radius: 7px; border: 1px solid var(--border); background: #fff; color: var(--muted); font-size: 11px; font-family: 'Noto Sans JP', sans-serif; font-weight: 700; cursor: pointer; transition: all 0.18s; }
.scbtn:hover { border-color: var(--cyan); color: var(--cyan); }
.scbtn.danger:hover { border-color: var(--danger); color: var(--danger); }
.scbtn.copied { background: rgba(0,184,169,0.1); border-color: var(--cyan); color: var(--cyan); }
.sc-chars { margin-left: auto; font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ヘッダー右側 */
.header-right { display: flex; align-items: center; gap: 10px; }
.hdr-btn {
  padding: 6px 14px; border-radius: 8px;
  border: 1px solid var(--border); background: #f4f7fb;
  color: var(--muted); font-size: 12px; font-family: 'Noto Sans JP', sans-serif;
  font-weight: 700; cursor: pointer; transition: all 0.2s;

}
.hdr-btn:hover { border-color: var(--cyan); color: var(--cyan); background: rgba(0,184,169,0.06); }

/* カスタム日付ピッカー */
.date-picker-wrap { position: relative; }
.date-picker-btn {
  width: 100%; padding: 10px 13px; background: #fff;
  border: 1px solid var(--border); border-radius: 9px;
  color: var(--white); font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px; text-align: left; cursor: pointer;
  transition: border-color 0.2s, box-shadow 0.2s;
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.04);
}
.date-picker-btn:hover, .date-picker-btn.open { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,184,169,0.12); }
.date-picker-panel {
  position: absolute; top: calc(100% + 6px); left: 0; z-index: 500;
  background: #fff; border: 1px solid var(--border);
  border-radius: 14px; padding: 16px; width: 310px;
  box-shadow: 0 8px 32px rgba(0,60,120,0.14);
  animation: fadeIn 0.18s ease;
}
.dp-cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; font-weight: 700; font-size: 14px; color: var(--white); }
.dp-cal-nav button { width: 28px; height: 28px; border: 1px solid var(--border); background: #f4f7fb; border-radius: 7px; cursor: pointer; font-size: 15px; color: var(--muted); display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.dp-cal-nav button:hover { border-color: var(--cyan); color: var(--cyan); }
.dp-cal-hd { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 6px; }
.dp-cal-hd span { text-align: center; font-size: 11px; font-weight: 700; color: var(--muted); padding: 4px 0; }
.dp-cal-hd .sat { color: #2563eb; }
.dp-cal-hd .sun { color: #dc2626; }

}
.dp-day:hover { background: rgba(0,184,169,0.1); border-color: var(--cyan); }
.dp-day.other { color: #c0d0e0; pointer-events: none; }
.dp-day.today { border-color: var(--cyan); color: var(--cyan); font-weight: 700; }
.dp-day.selected { background: var(--cyan); color: #fff !important; font-weight: 700; border-color: var(--cyan); }
.dp-day.sat { color: #2563eb; }
.dp-day.sun { color: #dc2626; }
.dp-time-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }

.dp-ok-btn:hover { opacity: 0.88; }
.dp-clear-btn { padding: 8px 14px; background: #f4f7fb; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: 'Noto Sans JP', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; }
.dp-clear-btn:hover { border-color: var(--danger); color: var(--danger); }

.toast { position: fixed; bottom: 24px; right: 24px; background: var(--cyan); color: #fff; padding: 10px 18px; border-radius: 9px; font-size: 13px; font-weight: 700; z-index: 9999; animation: tin 0.3s ease, tout 0.3s ease 1.9s forwards; pointer-events: none; box-shadow: 0 4px 16px rgba(0,184,169,0.4); }

<!-- ★ 新規作成用のフローティングボタン（FAB） -->
<button class="fab-btn" id="fabBtn" onclick="createNewPost()">＋</button>

<script>
let posts = [];
try {
  posts = JSON.parse(localStorage.getItem('sns_mgr_v2') || '[]');
} catch (e) {
  console.warn('プレビュー環境のため、ブラウザの保存機能が制限されています。');
}

let selP = [];
let editId = null;
let cY = new Date().getFullYear();
let cM = new Date().getMonth();
let selDate = null;
let sf = 'all';
let dpYear = new Date().getFullYear();
let dpMonth = new Date().getMonth();
let dpSelDate = null;

const save = () => {
  try {
    localStorage.setItem('sns_mgr_v2', JSON.stringify(posts));
  } catch (e) {}
};

const WD = ['日','月','火','水','木','金','土'];
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
};
const pad = n => String(n).padStart(2,'0');
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtDt = d => {
  if (!d) return '未設定';
  const dt = new Date(d);
  return `${dt.getMonth()+1}/${dt.getDate()} ${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
};

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2400);
}

function showError(msg) {
  const el = document.getElementById('formError');
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
  window.scrollTo(0, 0); 
  setTimeout(() => el.style.display = 'none', 4500);
}

function initDate() {
  const d = new Date();
  document.getElementById('hDate').textContent = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${WD[d.getDay()]}）`;
}

function gotoTab(name, el) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  if(el) el.classList.add('active');
  
  // ★ ネタ作成画面のときは「＋」ボタンを隠す
  const fab = document.getElementById('fabBtn');
  if (fab) {
    fab.style.display = (name === 'create') ? 'none' : 'flex';
  }

  if (name === 'today') renderToday();
  if (name === 'calendar') renderCalendar();
  if (name === 'stock') renderStock();
}

function renderToday() {
  const ts = todayStr();
  const d = new Date();
  document.getElementById('todayLabel').textContent = `${d.getMonth()+1}月${d.getDate()}日（${WD[d.getDay()]}）`;

  const todayPosts = posts.filter(p => p.date && p.date.startsWith(ts) && p.status !== 'posted');
  const donePosts  = posts.filter(p => p.date && p.date.startsWith(ts) && p.status === 'posted');
  document.getElementById('todayNum').innerHTML = `${todayPosts.length}<span>件</span>`;

  const container = document.getElementById('todayList');
  if (todayPosts.length + donePosts.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="ico">😴</div>
      <p>今日の投稿予定はありません。<br><br>
      <span class="empty-link" onclick="createNewPost()">「＋」ボタン</span>で
      今日の日時をセットして<br>投稿内容を登録しておきましょう！</p>
    </div>`;
    return;
  }

  const all = [...todayPosts, ...donePosts].sort((a,b) => (a.date||'').localeCompare(b.date||''));
  container.innerHTML = all.map(p => {
    const badges = p.platforms.map(pl => `<span class="pbadge pbadge-${pl}">${pl==='X'?'𝕏 X':pl}</span>`).join('');
    const timeStr = p.date ? p.date.slice(11,16) : '';
    const done = p.status === 'posted';
    return `<div class="today-card ${done?'is-done':''}" id="tc-${p.id}">
      <div class="card-top">
        ${badges}
        ${timeStr ? `<span class="post-time">🕐 ${timeStr}</span>` : ''}
        ${done ? '<span class="done-pill">✅ 投稿済み</span>' : ''}
      </div>
      <div class="text-box" id="tb-${p.id}" onclick="flashCopy('${p.id}', this)">${esc(p.text)}</div>
      ${srcHtml(p)}
      ${p.memo ? `<div class="memo-line">💬 ${esc(p.memo)}</div>` : ''}
      <div class="card-actions">
        <button class="abtn primary" onclick="copyBtn('${p.id}', this)">📋 コピーする</button>
        ${!done ? `<button class="abtn" onclick="markPosted('${p.id}')">✅ 投稿済みに</button>` : ''}
        <button class="abtn" onclick="editPost('${p.id}')">✏️ 編集</button>
        <button class="abtn danger" onclick="delPost('${p.id}')">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

function gotoTabByName(name) {
  const tabs = document.querySelectorAll('.tab');
  const names = ['today','calendar','create','stock'];
  const idx = names.indexOf(name);
  if (idx > -1 && tabs[idx]) {
    gotoTab(name, tabs[idx]);
  }
}

// ★ 「＋」ボタンを押したときの処理（確実にリセットしてネタ作成へ飛ぶ）
function createNewPost() {
  clearForm(false);
  gotoTabByName('create');
  window.scrollTo(0, 0);
  setTimeout(() => document.getElementById('fText').focus(), 100);
}

async function doCopy(id) {
  const p = posts.find(x => x.id === id);
  if (!p) return false;
  try { 
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(p.text); 
      return true;
    } else {
      throw new Error('Clipboard API unavailable');
    }
  } catch (err) {
    try {
      const ta = document.createElement('textarea');
      ta.value = p.text;
      ta.style.position = 'fixed';
      ta.style.top = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      const res = document.execCommand('copy');
      document.body.removeChild(ta);
      if (res) return true;
    } catch(e2) {}
    showToast('手動でコピーしてください'); 
    return false; 
  }
}

async function flashCopy(id, el) {
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 800);
  const ok = await doCopy(id);
  if (ok) showToast('📋 コピーしました！貼り付けて投稿してください');
}

async function copyBtn(id, btn) {
  const ok = await doCopy(id);
  if (ok) {
    btn.textContent = '✅ コピー完了！';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 コピーする'; btn.classList.remove('copied'); }, 2500);
  }
}

function markPosted(id) {
  const p = posts.find(x => x.id === id);
  if (p) { p.status = 'posted'; p.updatedAt = Date.now(); }
  save(); renderToday(); renderStock();
  showToast('✅ 投稿済みにしました！');
}

function delPost(id) {
  if (!confirm('この投稿を削除しますか？')) return;
  posts = posts.filter(x => x.id !== id);
  save(); 
  
  renderToday(); 
  renderStock(); 
  renderCalendar(); 
  
  if (selDate) renderDayDetail(selDate); 
  
  showToast('🗑️ 削除しました');
  
  if (editId === id) {
    clearForm(true); 
    gotoTabByName('calendar');
  }
}

function deleteFromEdit() {
  if (editId) {
    delPost(editId);
  }
}

function editPost(id) {
  const p = posts.find(x => x.id === id);
  if (!p) return;
  editId = id;
  selP = [...p.platforms];
  document.getElementById('fText').value = p.text;
  document.getElementById('fDate').value = p.date || '';
  document.getElementById('fMemo').value = p.memo || '';
  document.getElementById('fStatus').value = p.status;
  document.getElementById('fSourceTitle').value = p.sourceTitle || '';
  document.getElementById('fSourceUrl').value = p.sourceUrl || '';
  updatePbtns(); updateCC(); updateSourceBox();
  setDatePickerValue(p.date || '');
  document.getElementById('editNotice').style.display = 'block';
  document.getElementById('formError').style.display = 'none';
  
  document.getElementById('btnDeleteForm').style.display = 'block'; 
  
  gotoTabByName('create');
  window.scrollTo(0,0);
  setTimeout(() => document.getElementById('fText').focus(), 100);
}

  '2026-05-06':'こどもの日振替','2026-07-20':'海の日','2026-08-11':'山の日',
  '2026-09-21':'敬老の日','2026-09-22':'国民の休日','2026-09-23':'秋分の日',
  '2026-10-12':'スポーツの日','2026-11-03':'文化の日','2026-11-23':'勤労感謝の日'
};

function renderCalendar() {
  document.getElementById('calTitle').textContent = `${cY}年 ${cM+1}月`;
  const today = new Date();
  const tsToday = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;

  const rawFirst = new Date(cY, cM, 1).getDay(); 
  const firstDay = (rawFirst + 6) % 7; 
  const dim = new Date(cY, cM+1, 0).getDate();
  const diPrev = new Date(cY, cM, 0).getDate();
  let total = firstDay + dim;
  if (total % 7) total += 7 - (total % 7);

  let html = '';
  for (let i = 0; i < total; i++) {
    let day, m, y, other = false;
    if (i < firstDay) {
      day = diPrev - firstDay + i + 1; m = cM - 1; y = cY; other = true;
    } else if (i >= firstDay + dim) {
      day = i - firstDay - dim + 1; m = cM + 1; y = cY; other = true;
    } else {
      day = i - firstDay + 1; m = cM; y = cY;
    }

    let rm = m, ry = y;
    if (rm < 0) { rm = 11; ry = y - 1; }
    if (rm > 11) { rm = 0; ry = y + 1; }

    const ds = `${ry}-${pad(rm+1)}-${pad(day)}`;
    const dow = new Date(ds).getDay(); 
    const isSat = dow === 6;
    const isSun = dow === 0;
    const holName = JP_HOLIDAYS[ds] || '';
    const isHol = !!holName;
    const isToday = ds === tsToday;
    const isSel = ds === selDate;

    const dp = posts.filter(p => p.date && p.date.startsWith(ds));
    
    // ★ カレンダー上のドット表示（色の組み合わせ判定）
    const dots = dp.slice(0, 4).map(p => {
      const isNote = p.platforms.includes('note');
      const isBase = p.platforms.includes('BASE');
      
      let dotCls = 'sns-src';
      if (isNote && isBase) dotCls = 'pink-src'; // 両方ならピンク
      else if (isBase) dotCls = 'base-src';      // BASEなら黄色
      else if (isNote) dotCls = 'note-src';      // noteなら緑
      
      const icon = (isNote && isBase) ? '📝🛒' : isBase ? '🛒' : isNote ? '📝' : p.platforms[0]?.charAt(0)||'';
      const label = (p.sourceTitle || p.text).slice(0, 9);
      return `<div class="cal-dot ${dotCls}" title="${esc(p.sourceTitle || p.text)}" onclick="event.stopPropagation(); editPost('${p.id}')">${icon} ${label}</div>`;
    }).join('');

    const classes = [
      other ? 'other-m' : '',
      isToday ? 'is-today' : '',
      isSel ? 'is-selected' : '',
      isSat && !other ? 'is-sat' : '',
      (isSun || isHol) && !other ? 'is-sun' : ''
    ].filter(Boolean).join(' ');

    const holTag = isHol && !other ? `<span class="hol-name">${holName}</span>` : '';

    html += `<div id="cal-cell-${ds}" class="cal-cell ${classes}" onclick="pickDate('${ds}')">
      <div class="cal-day">${day}${holTag}</div>
      ${dots}
    </div>`;
  }
  document.getElementById('calGrid').innerHTML = html;
  if (selDate) renderDayDetail(selDate);
}

function chMonth(d) {
  cM += d;
  if (cM > 11) { cM = 0; cY++; }
  if (cM < 0) { cM = 11; cY--; }
  renderCalendar();
}

function pickDate(ds) {
  selDate = ds;
  renderCalendar();
  renderDayDetail(ds);
}

function renderDayDetail(ds) {
  const [y, m, d] = ds.split('-');
  const dt = new Date(parseInt(y, 10), parseInt(m, 10) - 1, parseInt(d, 10));
  const dow = dt.getDay();
  const dowLabel = ['日','月','火','水','木','金','土'][dow];
  const holName = JP_HOLIDAYS[ds] || '';
  const holStr = holName ? ` 🎌${holName}` : '';
  const label = `${parseInt(m, 10)}月${parseInt(d, 10)}日（${dowLabel}）${holStr}`;
  const dp = posts.filter(p => p.date && p.date.startsWith(ds)).sort((a,b)=>(a.date||'').localeCompare(b.date||''));

  const cards = dp.length === 0
    ? `<div class="dd-empty">この日の投稿はありません</div>`
    : dp.map(p => {
        const bs = p.platforms.map(pl => `<span class="pbadge pbadge-${pl}" style="font-size:10px;padding:2px 7px;">${pl==='X'?'𝕏':pl.slice(0,2)}</span>`).join('');
        const tstr = p.date ? p.date.slice(11,16) : '';
        
        // ★ 詳細のソース表示部分の色分け判定
        let srcHtmlStr = '';
        if (p.sourceTitle || p.sourceUrl) {
          const hasNote = p.platforms.includes('note');
          const hasBase = p.platforms.includes('BASE');
          let bg, border, icon;
          if (hasNote && hasBase) { bg = 'rgba(244, 114, 182, 0.05)'; border = '#f472b6'; icon = '📝🛒'; }
          else if (hasBase) { bg = 'rgba(245, 158, 11, 0.05)'; border = '#d97706'; icon = '🛒'; }
          else { bg = 'rgba(22, 163, 74, 0.05)'; border = '#16a34a'; icon = '📝'; }
          
          srcHtmlStr = `<div style="font-size:11px;color:var(--muted);margin-top:4px;padding:5px 8px;background:${bg};border-radius:5px;border-left:3px solid ${border}">${icon} ${esc(p.sourceTitle||'')}${p.sourceUrl?`<br><a href="${esc(p.sourceUrl)}" target="_blank" style="color:var(--cyan);font-size:10px;">${esc(p.sourceUrl)}</a>`:''}</div>`;
        }

        return `<div class="dd-card">
          <div class="dd-left">
            <div style="display:flex;gap:3px;flex-wrap:wrap;">${bs}</div>
            ${tstr ? `<div style="font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;">${tstr}</div>` : ''}
            <div class="spill spill-${p.status}" style="font-size:10px;padding:2px 7px;margin-top:2px;">${p.status==='draft'?'下書き':p.status==='scheduled'?'予定':'済み'}</div>
          </div>
          <div class="dd-text">${esc(p.text)}</div>
          ${srcHtmlStr}
          <div class="dd-actions">
            <button class="smbtn" onclick="ddCopy('${p.id}',this)">📋 コピー</button>
            <button class="smbtn" onclick="editPost('${p.id}')">✏️ 編集</button>
            ${p.status!=='posted'?`<button class="smbtn" onclick="markPosted('${p.id}')">✅ 投稿済みにする</button>`:''}
            <button class="smbtn danger" onclick="delPost('${p.id}')">🗑️ 削除</button>
          </div>
        </div>`;
      }).join('');

  document.getElementById('dayDetail').innerHTML = `<div class="dd-title">
    ${label}の投稿（${dp.length}件）
    <span class="dd-add-link" onclick="addForDate('${ds}')">＋ 追加</span>
  </div><div class="dd-cards-wrap">${cards}</div>`;
}

async function ddCopy(id, btn) {
  await doCopy(id);
  btn.textContent = '✅ コピー済み';
  setTimeout(() => btn.textContent = '📋 コピー', 2200);
}

function addForDate(ds) {
  clearForm();
  document.getElementById('fDate').value = ds + 'T09:00';
  setDatePickerValue(ds + 'T09:00');
  gotoTabByName('create');
  window.scrollTo(0,0);
  setTimeout(() => document.getElementById('fText').focus(), 100);
}

// ── フォーム ──
function toggleP(p) {
  const i = selP.indexOf(p);
  if (i > -1) selP.splice(i, 1); else selP.push(p);
  updatePbtns();
  updateSourceBox();
}
function updatePbtns() {
  document.querySelectorAll('.pbtn').forEach(b => {
    const p = b.dataset.p;
    b.className = 'pbtn' + (selP.includes(p) ? ` on-${p}` : '');
  });
}
function updateSourceBox() {
  const box = document.getElementById('sourceBox');
  const lbl = document.getElementById('sourceBoxLabel');
  const hasNote = selP.includes('note');
  const hasBase = selP.includes('BASE');
  if (hasNote || hasBase) {
    box.classList.add('show');
    if (hasNote && hasBase) {
      lbl.textContent = '📝 note / 🛒 BASE 掲載情報';
      box.style.borderColor = 'rgba(244, 114, 182, 0.4)'; // ピンク
    } else if (hasBase) {
      lbl.textContent = '🛒 BASE 商品・掲載情報';
      box.style.borderColor = 'rgba(217, 119, 6, 0.4)'; // 黄色
    } else {
      lbl.textContent = '📝 note 掲載情報';
      box.style.borderColor = 'rgba(22, 163, 74, 0.4)'; // 緑
    }
  } else {
    box.classList.remove('show');
  }
}
function updateCC() {
  const len = document.getElementById('fText').value.length;
  const el = document.getElementById('charCC');
  el.textContent = `${len} 文字`;
  el.className = 'char-cc' + (len > 200 ? ' warn' : '') + (len > 280 ? ' over' : '');
}

function savePost() {
  try {
    const text = document.getElementById('fText').value.trim();
    
    if (selP.length === 0) { 
      showError('投稿先（Xやnoteなど）を1つ以上選択してください！'); 
      return; 
    }
    
    const srcTitle = document.getElementById('fSourceTitle').value.trim();
    const srcUrl = document.getElementById('fSourceUrl').value.trim();
    const snsOnly = selP.every(p => ['X','Threads','Facebook'].includes(p));
    
    if (snsOnly && !text) { 
      showError('投稿テキストを入力してください！'); 
      return; 
    }
    if (!text && !srcTitle) { 
      showError('投稿テキストまたはタイトルを入力してください！'); 
      return; 
    }

    const dVal = document.getElementById('fDate').value;

    const post = {
      id: editId || Date.now().toString(),
      text, 
      platforms: [...selP],
      sourceTitle: srcTitle,
      sourceUrl: srcUrl,
      date: dVal,
      memo: document.getElementById('fMemo').value.trim(),
      status: document.getElementById('fStatus').value,
      createdAt: editId ? (posts.find(p=>p.id===editId)?.createdAt || Date.now()) : Date.now(),
      updatedAt: Date.now()
    };
    
    const isEdit = !!editId;
    if (isEdit) { 
      const i = posts.findIndex(p=>p.id===editId); 
      if(i > -1) posts[i] = post; 
    } else {
      posts.unshift(post);
    }
    
    save(); 
    clearForm(true); 
    showToast(isEdit ? '✅ 更新しました！' : '💾 保存しました！');
    
    if (dVal) {
      const dStr = dVal.slice(0, 10); 
      if (dStr) {
        const [yy, mm, dd] = dStr.split('-');
        cY = parseInt(yy, 10);
        cM = parseInt(mm, 10) - 1;
        selDate = dStr;
        
        gotoTabByName('calendar');
        
        setTimeout(() => {
          const targetCell = document.getElementById(`cal-cell-${dStr}`);
          if (targetCell) {
            targetCell.scrollIntoView({ behavior: 'smooth', block: 'center' });
            targetCell.classList.add('flash-cell');
            setTimeout(() => targetCell.classList.remove('flash-cell'), 1600); 
          } else {
             window.scrollTo(0, 0); 
          }
        }, 80);
        
        return;
      }
    }
    
    gotoTabByName('stock');
    window.scrollTo(0, 0);
  } catch (err) {
    showError('保存中にエラーが発生しました。やり直してください。');
  }
}

function clearForm(isAfterSave = false) {
  document.getElementById('fText').value = '';
  
  const now = new Date();
  const ds = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  const hs = pad(now.getHours());
  const ms = pad(Math.floor(now.getMinutes()/5)*5);
  dpSelDate = ds;
  dpYear = now.getFullYear();
  dpMonth = now.getMonth();
  
  const hrSel = document.getElementById('dpHour');
  const mnSel = document.getElementById('dpMin');
  if(hrSel) hrSel.value = hs;
  if(mnSel) mnSel.value = ms;
  
  updateDatePickerLabel(); 
  
  document.getElementById('fMemo').value = '';
  document.getElementById('fStatus').value = 'scheduled';
  document.getElementById('fSourceTitle').value = '';
  document.getElementById('fSourceUrl').value = '';
  
  selP = ['X']; 
  updatePbtns(); 
  updateCC(); 
  updateSourceBox();
  
  editId = null;
  document.getElementById('editNotice').style.display = 'none';
  
  document.getElementById('btnDeleteForm').style.display = 'none'; 
  
  if(!isAfterSave) {
    document.getElementById('formError').style.display = 'none';
  }
}

function srcHtml(p) {
  if (!p.sourceTitle && !p.sourceUrl) return '';
  const hasNote = p.platforms.includes('note');
  const hasBase = p.platforms.includes('BASE');
  
  let cls = 'card-source';
  if (hasNote && hasBase) cls += ' both-src';
  else if (hasBase) cls += ' base-only';
  else if (hasNote) cls += ' note-only';
  else cls += ' note-only'; // 念のためのフォールバック

  const icon = (hasNote && hasBase) ? '📝🛒' : hasBase ? '🛒' : '📝';
  const url = p.sourceUrl
    ? `<br><a href="${esc(p.sourceUrl)}" target="_blank">${esc(p.sourceUrl)}</a>`
    : '';
  return `<div class="${cls}">${icon} ${esc(p.sourceTitle||'')}${url}</div>`;
}

function setSF(f, btn) {
  sf = f;
  document.querySelectorAll('.sfbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderStock();
}

function renderStock() {
  const q = (document.getElementById('stockSearch')?.value || '').toLowerCase();
  const fl = posts.filter(p => {
    const mf = sf === 'all' || p.status === sf;
    const ms = !q || p.text.toLowerCase().includes(q) || (p.memo||'').toLowerCase().includes(q);
    return mf && ms;
  }).sort((a,b) => {
    if (a.date && b.date) return a.date.localeCompare(b.date);
    if (a.date) return -1; if (b.date) return 1;
    return b.createdAt - a.createdAt;
  });

  const c = document.getElementById('stockList');
  if (fl.length === 0) {
    c.innerHTML = `<div class="empty-state"><div class="ico">📭</div><p>投稿がありません</p></div>`;
    return;
  }
  const stMap = { draft:['spill-draft','📝 下書き'], scheduled:['spill-scheduled','📅 予定'], posted:['spill-posted','✅ 済み'] };
  c.innerHTML = fl.map(p => {
    const bs = p.platforms.map(pl => `<span class="pbadge pbadge-${pl}" style="font-size:10px;">${pl==='X'?'𝕏':pl.slice(0,2)}</span>`).join('');
    const [sc,sl] = stMap[p.status]||stMap.draft;
    return `<div class="stock-card">
      <div class="sc-top">
        ${bs}
        <span class="spill ${sc}">${sl}</span>
        <span class="sc-date">🕐 ${fmtDt(p.date)}</span>
      </div>
      <div class="sc-text">${esc(p.text)}</div>
      ${srcHtml(p)}
      ${p.memo ? `<div class="sc-memo">💬 ${esc(p.memo)}</div>` : ''}
      <div class="sc-actions">
        <button class="scbtn" onclick="scCopy('${p.id}',this)">📋 コピー</button>
        <button class="scbtn" onclick="editPost('${p.id}')">✏️ 編集</button>
        ${p.status!=='posted'?`<button class="scbtn" onclick="markPosted('${p.id}')">✅ 投稿済み</button>`:''}
        <button class="scbtn danger" onclick="delPost('${p.id}')">🗑️</button>
        <span class="sc-chars">${p.text.length}文字</span>
      </div>
    </div>`;
  }).join('');
}

function initDatePicker() {
  const hourSel = document.getElementById('dpHour');
  const minSel = document.getElementById('dpMin');
  hourSel.innerHTML = Array.from({length:24},(_,i)=>`<option value="${pad(i)}">${pad(i)}時</option>`).join('');
  minSel.innerHTML = ['00','05','10','15','20','25','30','35','40','45','50','55'].map(m=>`<option value="${m}">${m}分</option>`).join('');
  hourSel.value = '09';
  renderDpCal();
}

function toggleDatePicker() {
  const panel = document.getElementById('datePickerPanel');
  const btn = document.querySelector('.date-picker-btn');
  const isOpen = panel.style.display !== 'none';
  panel.style.display = isOpen ? 'none' : 'block';
  btn.classList.toggle('open', !isOpen);
  if (!isOpen) renderDpCal();
}

function closeDatePicker() {
  document.getElementById('datePickerPanel').style.display = 'none';
  document.querySelector('.date-picker-btn').classList.remove('open');
  updateDatePickerLabel();
}

function clearDatePicker() {
  dpSelDate = null;
  document.getElementById('fDate').value = '';
  document.getElementById('dpCalGrid').querySelectorAll('.dp-day').forEach(d => d.classList.remove('selected'));
  document.getElementById('datePickerLabel').textContent = '📅 日付・時間を選択';
  closeDatePicker();
}

function dpChangeMonth(d) {
  dpMonth += d;
  if (dpMonth > 11) { dpMonth = 0; dpYear++; }
  if (dpMonth < 0) { dpMonth = 11; dpYear--; }
  renderDpCal();
}

function renderDpCal() {
  document.getElementById('dpCalTitle').textContent = `${dpYear}年${dpMonth+1}月`;
  const today = new Date();
  const tsToday = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
  const firstDay = new Date(dpYear, dpMonth, 1).getDay();
  const firstMon = (firstDay + 6) % 7;
  const dim = new Date(dpYear, dpMonth+1, 0).getDate();
  const diPrev = new Date(dpYear, dpMonth, 0).getDate();
  let total = firstMon + dim;
  if (total % 7) total += 7 - (total % 7);

  let html = '';
  for (let i = 0; i < total; i++) {
    let day, m, y, other = false;
    if (i < firstMon) { day = diPrev - firstMon + i + 1; m = dpMonth-1; y = dpYear; other = true; }
    else if (i >= firstMon + dim) { day = i - firstMon - dim + 1; m = dpMonth+1; y = dpYear; other = true; }
    else { day = i - firstMon + 1; m = dpMonth; y = dpYear; }
    let rm = m, ry = y;
    if (rm < 0) { rm = 11; ry--; } if (rm > 11) { rm = 0; ry++; }
    const ds = `${ry}-${pad(rm+1)}-${pad(day)}`;
    const dow = new Date(ds).getDay();
    const isSat = dow === 6, isSun = dow === 0;
    const isSel = ds === dpSelDate;
    const isToday = ds === tsToday;
    const cls = [other?'other':'', isSat&&!other?'sat':'', isSun&&!other?'sun':'', isSel?'selected':'', isToday&&!isSel?'today':''].filter(Boolean).join(' ');
    html += `<div class="dp-day ${cls}" onclick="dpPickDay('${ds}')">${day}</div>`;
  }
  document.getElementById('dpCalGrid').innerHTML = html;
}

function dpPickDay(ds) {
  dpSelDate = ds;
  renderDpCal();
  updateDatePickerLabel();
}

function updateDatePickerLabel() {
  if (!dpSelDate) return;
  const hSel = document.getElementById('dpHour');
  const mSel = document.getElementById('dpMin');
  if(!hSel || !mSel) return;
  
  const h = hSel.value;
  const m = mSel.value;
  const [y, mo, d] = dpSelDate.split('-');
  const dow = ['日','月','火','水','木','金','土'][new Date(dpSelDate).getDay()];
  
  document.getElementById('datePickerLabel').textContent = `📅 ${parseInt(mo, 10)}月${parseInt(d, 10)}日（${dow}） ${h}:${m}`;
  document.getElementById('fDate').value = `${dpSelDate}T${h}:${m}`;
}

function setDatePickerValue(val) {
  if (!val) return;
  dpSelDate = val.slice(0, 10);
  const h = val.slice(11, 13) || '09';
  const rawMin = val.slice(14, 16) || '00';
  const m = ['00','05','10','15','20','25','30','35','40','45','50','55']
    .reduce((acc, v) => Math.abs(parseInt(v)-parseInt(rawMin)) < Math.abs(parseInt(acc)-parseInt(rawMin)) ? v : acc, '00');
  dpYear = parseInt(dpSelDate.slice(0,4), 10);
  dpMonth = parseInt(dpSelDate.slice(5,7), 10) - 1;
  
  const hSel = document.getElementById('dpHour');
  const mSel = document.getElementById('dpMin');
  if(hSel) hSel.value = h;
  if(mSel) mSel.value = m;
  
  updateDatePickerLabel();
}

document.addEventListener('click', e => {
  const wrap = document.getElementById('datePickerWrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('datePickerPanel').style.display = 'none';
    document.querySelector('.date-picker-btn')?.classList.remove('open');
  }
});

function backupData() {
  const data = { version: 2, exportedAt: new Date().toISOString(), posts };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const d = new Date();
  a.download = `sns_posts_${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.json`;
  a.click();
  showToast('⬇️ バックアップを保存しました');
}

function restoreData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      const imported = data.posts || data;
      if (!Array.isArray(imported)) throw new Error('形式エラー');
      if (!confirm(`${imported.length}件のデータを復元します。\n現在のデータは上書きされます。\nよろしいですか？`)) return;
      posts = imported;
      save();
      renderToday(); renderStock();
      if (document.getElementById('view-calendar').classList.contains('active')) renderCalendar();
      showToast(`✅ ${imported.length}件のデータを復元しました`);
    } catch {
      showToast('❌ ファイルの読み込みに失敗しました');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

// INIT
initDate();
initDatePicker();
clearForm(); // フォームの初期化（削除ボタンも隠す）

// ★ 初期画面を「カレンダー」に強制指定
gotoTabByName('calendar');
</script>
